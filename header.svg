<svg viewBox="0 0 900 160" xmlns="http://www.w3.org/2000/svg" width="900" height="160">
<defs>
<style>
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes drawLine{from{stroke-dashoffset:280}to{stroke-dashoffset:0}}
.name{font-family:Georgia,'Times New Roman',serif;font-size:52px;fill:#f1f5f9;letter-spacing:4px;animation:fadeUp .8s ease .1s both}
.role{font-family:Georgia,serif;font-size:14px;font-style:italic;fill:#64748b;letter-spacing:2.5px;animation:fadeUp .8s ease .4s both}
.line{stroke:#00c9a7;stroke-width:.9;stroke-dasharray:280;stroke-dashoffset:280;animation:drawLine 1s ease .3s forwards}
</style>
</defs>

<rect width="900" height="160" fill="#080c10" rx="10"/>

<text x="52" y="95" class="name">Nayanika</text>
<line x1="52" y1="107" x2="332" y2="107" class="line"/>
<text x="52" y="130" class="role">PhD Researcher · Computational Chemistry · Protein Illustration</text>
</svg>
